StylesPath = .
MinAlertLevel = suggestion

# Limit Vale to Markdown and AsciiDoc by default. Add `.po`, `.properties`, JSON i18n, etc. only with a
# format-aware tokenizer — Vale treats unknown formats as plain text and produces a high false-positive rate
# on placeholders.
[*.{md,adoc,markdown,mdx}]
BasedOnStyles = vale-fr-tech

# Vale runs against the file in any locale. Locale-specific rules belong to the project Vale config, not to
# this package: a fr-CA project disables the fr-FR-only rules in Terms.yml via `Vale.Terms = NO`, etc.
