name: qubership-global-essentials
version: 1.0.1
description: "Umbrella package with the Qubership agent setup that is useful in a global user workspace: APM authoring, code review, developer style, Markdown rules, repository onboarding, dependency PR triage, Renovate automerge, and ADR authoring."
dependencies:
  apm:
    # Sibling packages in this repository. Published manifests cannot use
    # local-path deps, so each one is pinned to a commit SHA on this repo.
    - Netcracker/qubership-ai-packages/agent-packages/apm-authoring#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/codex-review#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/english-us-developer-style#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/markdown-line-length-120#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/qubership-agent-support-pr#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/triage-dependency-prs#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/enable-renovate-automerge#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
    - Netcracker/qubership-ai-packages/agent-packages/adr-authoring#b5c51a1eaa16ac523d94008db6dd5ed5d946ea08  # main
