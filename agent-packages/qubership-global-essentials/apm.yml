name: qubership-global-essentials
version: 1.0.0
description: "Umbrella package with the Qubership agent setup that is useful in a global user workspace: APM authoring, code review, developer style, Markdown rules, repository onboarding, dependency PR triage, Renovate automerge, and ADR authoring."
dependencies:
  apm:
    # Sibling packages in this repository. Published manifests cannot use
    # local-path deps, so each one is pinned to a commit SHA on this repo.
    - Netcracker/qubership-ai-packages/agent-packages/apm-authoring#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/codex-review#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/english-us-developer-style#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/markdown-line-length-120#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/qubership-agent-support-pr#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/triage-dependency-prs#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/enable-renovate-automerge#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/adr-authoring#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
