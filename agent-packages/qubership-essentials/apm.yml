name: qubership-essentials
version: 1.0.0
description: "Umbrella package with the baseline agent setup for any Netcracker/Qubership repository: APM authoring, code review, English style, Markdown rules, workflow-hub usage, and skill telemetry."
dependencies:
  apm:
    # Sibling packages in this repository. Published manifests cannot use
    # local-path deps, so each one is pinned to a commit SHA on this repo.
    - Netcracker/qubership-ai-packages/agent-packages/apm-authoring#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/codex-review#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/english-us-developer-style#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    - Netcracker/qubership-ai-packages/agent-packages/markdown-line-length-120#cb31b6ce4d9457d2638b40590500a5229c230d99  # main
    # Packages hosted in other repositories.
    - Netcracker/qubership-workflow-hub/agent-packages/qubership-workflow-hub-usage#768c088ef2adf0081dd97cff19dae2ef3ccab9b1  # main
    - Netcracker/qubership-ai-agent-telemetry/agent-packages/ai-agent-telemetry#6ec9a71177fd9dd1a9d0dc134fdccbf255d26a55  # v1.0.0
