name: Spell Check

on:
  pull_request:
    paths:
      - '**.java'
      - '**.kt'
      - '**.kts'
      - '**.md'
      - '**.txt'
      - '**.yaml'
      - '**.yml'
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  misspell:
    name: Spell Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run misspell with reviewdog
        uses: reviewdog/action-misspell@d6429416b12b09b4e2768307d53bef58d172e962 # v1.27.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          locale: ""
          ignore: "cancelled,analyse"
          level: "warning"
          reporter: "github-pr-review"
          filter_mode: "diff_context"
          fail_level: "error"
          exclude: |
            ./.git/*
            ./node_modules/*
            ./.gradle/*
            ./build/*
            ./*/build/*
            ./profiler-ui/node_modules/*
            ./.agents/*
            ./.claude/*
            ./.codex/*
            ./.cursor/*
            ./agent-packages/french-developer-style/*
            ./research/french-developer-style/*
          pattern: |
            *.java
            *.kt
            *.kts
            *.md
            *.txt
            *.yaml
            *.yml
