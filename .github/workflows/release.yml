name: Release marketplace

# A marketplace release is a git tag `vX.Y.Z` that consumers pin. Pushing the
# tag runs this workflow, which validates the index and publishes a GitHub
# Release. Package authors never run these steps -- they only open pull requests.
on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
      - name: Check tag matches marketplace version
        run: |
          version="$(awk '/^version:/ { print $2; exit }' apm.yml)"
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Release tag $GITHUB_REF_NAME does not match apm.yml version $version."
            echo "Push $expected_tag, or update apm.yml before tagging."
            exit 1
          fi
      - name: Validate the index
        run: uvx --python 3.12 --from apm-cli --with-requirements requirements.txt apm pack --check-versions --check-clean --dry-run
      - name: Publish the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha256sum .claude-plugin/marketplace.json > .claude-plugin/marketplace.json.sha256
          gh release create "$GITHUB_REF_NAME" \
            .claude-plugin/marketplace.json \
            .claude-plugin/marketplace.json.sha256 \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
