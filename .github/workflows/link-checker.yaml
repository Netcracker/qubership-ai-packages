---
name: Link Checker

on:
  push:
    branches:
      - main
  repository_dispatch: null
  workflow_dispatch: null
  pull_request:
    branches:
      - '**'
    types:
      [opened, reopened, synchronize]
permissions: {}

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache/restore@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        id: restore-cache
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
          restore-keys: cache-lychee-

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            './**/*.md'
            --exclude-path '.agents/'
            --exclude-path '.claude/'
            --exclude-path '.codex/'
            --exclude-path '.cursor/'
            --exclude-path 'backend/'
            --verbose
            --no-progress
            --user-agent 'Mozilla/5.0 (X11; Linux x86_64) Chrome/134.0.0.0'
            --timeout 60
            --retry-wait-time 60
            --max-retries 8
            --accept 100..=103,200..=299,429
            --cookie-jar cookies.json
            --exclude-all-private
            --max-concurrency 4
            --cache
            --cache-exclude-status '403, 429, 500..502'
            --max-cache-age 1d
          format: markdown
          fail: true

      - name: Save lychee cache
        if: ${{ always() && steps.restore-cache.outputs.cache-hit != 'true' && hashFiles('.lycheecache/**') != '' }}
        uses: actions/cache/save@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.run_id }}
