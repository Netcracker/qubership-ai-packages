name: qubership-ai-packages
version: 1.1.0
description: Netcracker Qubership APM package marketplace

targets:
  - claude
  - codex
  - cursor

dependencies:
  apm:
    - Netcracker/qubership-ai-packages/agent-packages/qubership-essentials

marketplace:
  owner:
    name: Netcracker
    url: https://github.com/Netcracker

  outputs:
    claude: {}

  versioning:
    strategy: per_package

  packages:
    # --- packages in this repository (local-path) ---
    - name: apm-authoring
      description: Guidelines for authoring APM packages (instructions, skills, prompts, agents, hooks).
      source: ./agent-packages/apm-authoring
      version: 1.0.0
      tags: ["topic:documentation", "activity:authoring", "audience:public"]

    - name: go-microservice-dev-kit
      description: Umbrella package for Qubership Go microservices.
      source: ./agent-packages/go-microservice-dev-kit
      version: 1.0.0
      tags: ["topic:devops", "stack:go", "stack:kubernetes", "activity:coding", "audience:public"]

    - name: qubership-essentials
      description: "Umbrella package with the baseline agent setup for any Netcracker/Qubership repository: APM authoring, code review, English style, Markdown rules, workflow-hub usage, and skill telemetry."
      source: ./agent-packages/qubership-essentials
      version: 1.0.0
      tags: ["topic:meta", "activity:setup", "audience:public"]

    - name: qubership-global-essentials
      description: "Umbrella package with the Qubership agent setup that is useful in a global user workspace."
      source: ./agent-packages/qubership-global-essentials
      version: 1.0.0
      tags: ["topic:meta", "activity:setup", "audience:public"]

    - name: qubership-agent-support-pr
      description: Prepare a repository PR that installs qubership-essentials and generated agent assets.
      source: ./agent-packages/qubership-agent-support-pr
      version: 1.0.1
      tags: ["topic:meta", "activity:setup", "activity:maintenance", "audience:public"]

    - name: english-developer-style
      description: "Compatibility alias for the original package name; resolves to english-us-developer-style, so the bare name defaults to American English."
      source: ./agent-packages/english-developer-style
      version: 2.0.0
      tags: ["topic:documentation", "lang:en", "activity:authoring", "audience:public"]

    - name: english-uk-developer-style
      description: "British-English-first style guidance for developer-facing text: docs, code comments, commit messages, UI strings, and English localisation files."
      source: ./agent-packages/english-uk-developer-style
      version: 2.0.0
      tags: ["topic:documentation", "lang:en", "activity:authoring", "audience:public"]

    - name: english-us-developer-style
      description: "American-English-first style guidance for developer-facing text: docs, code comments, commit messages, UI strings, and English localization files."
      source: ./agent-packages/english-us-developer-style
      version: 2.0.0
      tags: ["topic:documentation", "lang:en", "activity:authoring", "audience:public"]

    - name: french-developer-style
      description: French technical-prose conventions for developer-facing text; defaults to fr-FR, with an fr-CA mode.
      source: ./agent-packages/french-developer-style
      version: 1.0.1
      tags: ["topic:documentation", "lang:fr", "activity:authoring", "audience:public"]

    - name: russian-developer-style
      description: "Russian style guidance for developer-facing text: docs, code comments, commit messages, UI strings, and Russian localisation files."
      source: ./agent-packages/russian-developer-style
      version: 1.0.1
      tags: ["topic:documentation", "lang:ru", "activity:authoring", "audience:public"]

    - name: markdown-line-length-120
      description: Markdown drafting rules an autofixer cannot fix, for repositories pinning markdownlint MD013.line_length to 120.
      source: ./agent-packages/markdown-line-length-120
      version: 1.0.0
      tags: ["topic:documentation", "stack:markdown", "activity:authoring", "audience:public"]

    - name: triage-dependency-prs
      description: Skill that triages failing checks on dependency-update PRs (Renovate and Dependabot) and drives them back to green.
      source: ./agent-packages/triage-dependency-prs
      version: 2.0.0
      tags: ["topic:devops", "topic:dependencies", "activity:maintenance", "audience:public"]

    - name: enable-renovate-automerge
      description: Skill that enables Renovate automerge on a repository behind a real test/style required check.
      source: ./agent-packages/enable-renovate-automerge
      version: 1.0.0
      tags: ["topic:devops", "topic:dependencies", "stack:github-actions", "activity:maintenance", "audience:public"]

    - name: adr-authoring
      description: Author Architecture Decision Records that follow the ADR contract used across Qubership repositories.
      source: ./agent-packages/adr-authoring
      version: 1.0.0
      tags: ["topic:documentation", "activity:authoring", "audience:public"]

    - name: codex-review
      description: Skill that runs a Codex CLI code review and applies the fixes, iterating until the review is clean.
      source: ./agent-packages/codex-review
      version: 1.0.0
      tags: ["topic:code-review", "activity:code-review", "audience:public"]

    # --- packages curated from other repositories (remote, pinned to a commit) ---
    # description and version are inherited from each package's own apm.yml.
    # ref is a commit SHA (branches are mutable and rejected); the trailing
    # comment records the source ref the SHA was taken from.
    - name: adapt-nifi-flows-to-2-x
      source: Netcracker/qubership-nifi
      subdir: agent-packages/adapt-nifi-flows-to-2-x
      ref: 93e76a9f27554a416e9af85a6fe10ff08132f0f0  # main
      tags: ["topic:integration", "stack:nifi", "activity:migration", "audience:public"]

    - name: api-diff-authoring
      source: Netcracker/qubership-apihub-api-diff
      subdir: agent-packages/api-diff-authoring
      ref: 47e14b19508880af6a099c6e7da7819215379d15  # develop
      tags: ["topic:api", "stack:typescript", "activity:authoring", "audience:public"]

    - name: api-unifier-authoring
      source: Netcracker/qubership-apihub-api-unifier
      subdir: agent-packages/api-unifier-authoring
      ref: 0752a2905671a0f08ac810613ec77d64e21fcb9f  # develop
      tags: ["topic:api", "stack:typescript", "activity:authoring", "audience:internal"]

    - name: api-unifier-testing
      source: Netcracker/qubership-apihub-api-unifier
      subdir: agent-packages/api-unifier-testing
      ref: 0752a2905671a0f08ac810613ec77d64e21fcb9f  # develop
      tags: ["topic:api", "stack:typescript", "activity:testing", "audience:internal"]

    - name: dbaas-mounted-secret-migration
      source: Netcracker/qubership-dbaas
      subdir: dbaas-operator/agent-packages/dbaas-mounted-secret-migration
      ref: 372a8f0d17248ef78c2859a918904ef32fa1d82d  # feat/operator-dev
      tags: ["topic:database", "stack:kubernetes", "activity:migration", "audience:public"]

    - name: migrate-core-operator-dbaas-declarations
      source: Netcracker/qubership-dbaas
      subdir: dbaas-operator/agent-packages/migrate-core-operator-dbaas-declarations
      ref: 372a8f0d17248ef78c2859a918904ef32fa1d82d  # feat/operator-dev
      tags: ["topic:database", "stack:kubernetes", "activity:migration", "audience:public"]

    - name: qubership-workflow-hub-usage
      source: Netcracker/qubership-workflow-hub
      subdir: agent-packages/qubership-workflow-hub-usage
      ref: 768c088ef2adf0081dd97cff19dae2ef3ccab9b1  # main
      tags: ["topic:devops", "stack:github-actions", "activity:authoring", "activity:code-review", "audience:public"]

    - name: core-mesh-to-istio-migration
      source: Netcracker/qubership-core-control-plane
      subdir: agent-packages/core-mesh-to-istio-migration
      ref: 1d8ba5fc9bb010f6063ffc89527acb99e4f097e8  # main
      tags: ["topic:cloud-core", "topic:service-mesh", "topic:istio", "activity:migration", "audience:public"]

    - name: ai-agent-telemetry
      source: Netcracker/qubership-ai-agent-telemetry
      subdir: agent-packages/ai-agent-telemetry
      ref: 6ec9a71177fd9dd1a9d0dc134fdccbf255d26a55  # main
      tags: ["topic:observability", "activity:telemetry", "audience:public"]

    - name: ai-agent-telemetry-configure
      source: Netcracker/qubership-ai-agent-telemetry
      subdir: agent-packages/ai-agent-telemetry-configure
      ref: 6ec9a71177fd9dd1a9d0dc134fdccbf255d26a55  # main
      tags: ["topic:observability", "activity:telemetry", "audience:public"]
